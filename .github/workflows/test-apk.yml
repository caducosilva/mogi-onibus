name: Test APK (artifact)

# Gera um APK universal para testar no aparelho (assinatura debug; sem secrets).
# Actions > "Test APK (artifact)" > Run workflow > baixar o artifact e adb install.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mogi-onibus-test-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
